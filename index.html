<!DOCTYPE html>
<html lang="de" color-mode="user">

<head>
    <meta charset=" UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json" />
    <title>Crafty</title>
    <script src="./d3.v7.min.js"></script>
    <script src="./crafty.mjs" type="module"></script>
    <link rel="stylesheet" href="./mvp.css">
    <link rel="stylesheet" href="./styles.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>

<body onload="init()" style="max-height: 100vmax;">
    <dialog id="newConfig">
        <h2>Neue Config:</h2>
        <form method="dialog" onsubmit="noi(event)">
            <label>
                <span>Name:</span>
                <input name="game" required>
            </label>
            <button>Erstellen</button>
        </form>
        <br>
    </dialog>
    <dialog id="loadConfig">
        <h2>Config laden:</h2>
        <form method="dialog" onsubmit="loadFile(event)">
            <label>
                Crafty Spec:
                <input type="file" name="cfg" required>
            </label>
            <button>Laden</button>
        </form>
        <br>
        <h2>Meta laden:</h2>
        <form method="dialog" onsubmit="loadMeta(event)">
            <label>
                Metadata:
                <input type="file" name="meta" required>
            </label>
            <button>Laden</button>
        </form>
        <br>
    </dialog>
    <header style="display: flex; align-items: center; justify-content: space-between;">
        <h1>🛠️ Crafty</h1>
        <nav>
            <ul style="margin: 0;">
                <li>
                    <a href="#recipe"><strong>Rezepte</strong></a>
                </li>
                <li>
                    <a href="#factory"><strong>Fabriken</strong></a>
                </li>
                <li>
                    <a href="#material"><strong>Materialien</strong></a>
                </li>
                <li>
                    <a href="#tree"><strong>TechTree</strong></a>
                </li>
                <li>
                    <a href="#map"><strong>Map</strong></a>
                </li>
                <li>
                    <a href="#todo"><strong>ToDo</strong></a>
                </li>
                <li>
                    <button type="button" onclick="openDialog('newConfig')">Neu</button>
                </li>
                <li>
                    <button type="button" onclick="openDialog('loadConfig')">Laden</button>
                </li>
                <li>
                    <button type="button" onclick="save()">Speichern</button>
                </li>
            </ul>
        </nav>
    </header>
    <main>
        <content id="content">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <info></info>
                <div>
                    <button class="fab" type="button" onclick="addMaterial()">+ 🪨</button>
                    <button class="fab" type="button" onclick="addRecipe()">+ 📄</button>
                    <button class="fab" type="button" onclick="addFactory()">+ 🏭</button>
                </div>
            </div>
            <div style="display: grid; grid-template-columns: min-content minmax(1px, 1fr); position: relative;">
                <div style="max-width: 300px; position: sticky; top: 0px; height: fit-content; padding-top: 10px;">
                    <div style="position: relative;">
                        <button class="fab" style="float: right; margin-top: 5px;"
                            onclick="[...event.target.parentElement.children].filter(a => a != event.target).forEach(e => e.classList.toggle('hidden')); event.target.classList.toggle('flip')">◀️</button>
                        <h2>Rezepte 📄</h2>
                        <filter style="display:block"></filter>
                        <recipes
                            style="display:block; overflow: auto; max-height: 90vh; border: 1px solid darkgray; padding: 2px">
                        </recipes>
                    </div>
                </div>
                <div style="flex-grow: 1;">
                    <outlet style="height: 100%;"></outlet>
                    <tree></tree>
                </div>
            </div>
            <fab-container>
            </fab-container>
        </content>
    </main>
</body>

</html>
